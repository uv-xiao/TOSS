name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: typstapp
          POSTGRES_PASSWORD: iv61v6mRPCGxvWjt
          POSTGRES_DB: typstappdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U typstapp -d typstappdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install Playwright Chromium
        run: |
          cd web
          npm ci
          npx playwright install --with-deps chromium

      - name: Run CI checks
        env:
          DATABASE_URL: postgres://typstapp:iv61v6mRPCGxvWjt@127.0.0.1:5432/typstappdb
          CORE_API_PORT: "18080"
        run: |
          chmod +x scripts/ci-checks.sh
          scripts/ci-checks.sh
